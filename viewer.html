<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Floor Plan Viewer</title>
<style>
  body { font-family: monospace; background: #f5f5f5; color: #333; margin: 20px; position: relative; }
  h2 { margin: 10px 0 5px; }
  .plan-container { display: inline-block; margin: 0 30px 30px 0; vertical-align: top; }
  .canvas {
    position: relative;
    width: 256px;
    height: 256px;
    background: #444;
    border: 1px solid #ccc;
  }
  /* z-order: obstacles (0) → rooms (1) → doors/windows (2) */
  .room       { position: absolute; background: #fff; box-sizing: border-box; z-index: 1; }
  .canvas.highlight-rooms .room { outline: 1px dashed #888; outline-offset: -1px; }
  .canvas.highlight-rooms .room[data-has-clip="1"] { outline: none; }
  .room-polygon-outline {
    display: none;
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .canvas.highlight-rooms .room .room-polygon-outline { display: block; }
  .obstacle   { position: absolute; background: #444; box-sizing: border-box; z-index: 0; }
  .canvas.highlight-obstacles .obstacle { border: 1px dashed #999; }
  .canvas.highlight-obstacles .obstacle[data-has-clip="1"] { border: none; }
  .obstacle-polygon-outline {
    display: none;
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .canvas.highlight-obstacles .obstacle .obstacle-polygon-outline { display: block; }
  .door       { position: absolute; background: rgba(255, 100, 100, 0.5); z-index: 2; }
  .window     { position: absolute; background: rgba(100, 180, 255, 0.4); border: 1px solid rgba(100, 180, 255, 0.8); box-sizing: border-box; z-index: 2; }
  .label      { position: absolute; font-size: 9px; color: #666; pointer-events: none; }
  .tooltip    { display: none; position: fixed; background: #222; color: #fff; padding: 4px 8px; font-size: 11px; border-radius: 3px; pointer-events: none; z-index: 100; white-space: pre; }
  .legend     { margin: 8px 0; font-size: 11px; }
  .legend span { display: inline-block; width: 12px; height: 12px; vertical-align: middle; margin-right: 4px; }

  /* Placement controls */
  .placement-controls {
    position: fixed; top: 16px; right: 20px; z-index: 200;
    display: flex; align-items: center; gap: 8px;
    font-size: 11px;
  }
  .placement-controls .choose-btn {
    padding: 4px 10px; background: #333; color: #fff; border: none;
    border-radius: 3px; cursor: pointer; font-family: monospace; font-size: 11px;
  }
  .placement-controls .choose-btn:hover { background: #555; }
  .placement-controls .chevron-btn {
    padding: 4px 6px; background: #333; color: #fff; border: none;
    border-radius: 3px; cursor: pointer; font-family: monospace; font-size: 9px;
    transition: background 0.1s;
  }
  .placement-controls .chevron-btn:hover { background: #555; }
  .placement-controls .chevron-btn.open { background: #555; }
  .file-panel {
    display: none;
    position: fixed; top: 38px; right: 20px; z-index: 201;
    background: #222; color: #ccc; border-radius: 3px;
    font-size: 10px; font-family: monospace;
    width: 280px; max-height: 200px; overflow-y: auto;
    padding: 6px 0;
  }
  .file-panel.open { display: block; }
  .file-panel .file-entry {
    padding: 3px 10px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .file-panel .file-entry:hover { background: #333; }
  .file-panel .file-empty { padding: 6px 10px; color: #666; font-style: italic; }
  .placement-item {
    position: absolute;
    box-sizing: border-box;
    border: 1px solid rgba(0,0,0,0.4);
    z-index: 3;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.1s;
  }
  .placement-item:hover { opacity: 1; }
  .placement-item.tier-anchor  { background: rgba(156, 39, 176, 0.5); border-color: rgba(156, 39, 176, 0.8); }
  .placement-item.tier-accent  { background: rgba(52, 168, 83, 0.5);  border-color: rgba(52, 168, 83, 0.8); }
  .placement-item.tier-fill    { background: rgba(251, 188, 4, 0.5);  border-color: rgba(251, 188, 4, 0.8); }
  .placement-item-label {
    position: absolute;
    font-size: 7px;
    color: #000;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
    pointer-events: none;
    left: 1px;
    top: 1px;
    line-height: 1;
  }
  .placement-gen { font-size: 10px; color: #666; margin-top: 2px; }

  /* View toggle */
  .view-toggle {
    display: inline-flex; border-radius: 3px; overflow: hidden; margin-left: 0;
  }
  .view-toggle button {
    padding: 4px 10px; background: #ddd; color: #333; border: none;
    cursor: pointer; font-family: monospace; font-size: 11px;
  }
  .view-toggle button:hover { background: #ccc; }
  .view-toggle button.active { background: #333; color: #fff; }

  /* Model tab bar */
  .model-tabs {
    display: flex; gap: 2px; margin: 4px 0; flex-wrap: wrap;
  }
  .model-tabs button {
    padding: 2px 8px; background: #ddd; color: #333; border: none;
    border-radius: 3px 3px 0 0; cursor: pointer; font-family: monospace; font-size: 10px;
  }
  .model-tabs button:hover { background: #bbb; }
  .model-tabs button.active { background: #333; color: #fff; }
  .model-stats {
    font-size: 10px; color: #666; margin-top: 2px;
  }

  /* Matrix view */
  #matrix-view { display: none; }
  .matrix-plan { margin-bottom: 24px; }
  .matrix-plan h2 { margin: 10px 0 8px; }
  .matrix-row {
    display: flex; flex-wrap: wrap; gap: 12px;
  }
  .matrix-cell {
    flex: 0 0 auto;
    text-align: center;
  }
  .matrix-cell-label {
    font-size: 10px; font-weight: bold; margin-bottom: 2px;
    max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .matrix-cell-stats {
    font-size: 9px; color: #666; margin-top: 2px;
  }
  .matrix-canvas-wrapper {
    overflow: hidden;
    border: 1px solid #ccc;
  }
  .matrix-canvas-wrapper .canvas {
    border: none;
  }
</style>
</head>
<body>
<h1>Floor Plan Viewer</h1>
<div class="legend">
  <span style="background:#fff;border:1px dashed #aaa"></span> Room
  <span style="background:#444;margin-left:12px"></span> Structure
  <span style="background:rgba(255,100,100,0.5);margin-left:12px"></span> Door clearance
  <span style="background:rgba(100,180,255,0.4);border:1px solid rgba(100,180,255,0.8);margin-left:12px"></span> Window zone
  <span style="background:rgba(156,39,176,0.5);border:1px solid rgba(156,39,176,0.8);margin-left:12px"></span> Anchor
  <span style="background:rgba(52,168,83,0.5);border:1px solid rgba(52,168,83,0.8);margin-left:12px"></span> Accent
  <span style="background:rgba(251,188,4,0.5);border:1px solid rgba(251,188,4,0.8);margin-left:12px"></span> Fill
</div>
<div class="placement-controls">
  <div class="view-toggle" id="view-toggle" style="display:none">
    <button class="active" data-view="gallery">Gallery</button>
    <button data-view="matrix">Matrix</button>
  </div>
  <button class="choose-btn" onclick="document.getElementById('placement-input').click()">Choose folder</button>
  <button class="choose-btn" onclick="document.getElementById('layout-input').click()">Add layout</button>
  <button class="chevron-btn" id="chevron-btn" onclick="toggleFilePanel()">&#9664;</button>
  <input type="file" id="placement-input" webkitdirectory style="display:none">
  <input type="file" id="layout-input" accept=".json" style="display:none">
</div>
<div class="file-panel" id="file-panel">
  <div class="file-empty">No placements loaded</div>
</div>
<div id="gallery-view">
  <div id="plans"></div>
</div>
<div id="matrix-view"></div>
<div class="tooltip" id="tooltip"></div>

<script>
const OUTPUT_DIR = "quantize_room.output";
const PLAN_STEMS = [
  "corner_suite",
  "cozy_cottage",
  "gallery_hall",
  "open_loft",
  "townhouse",
];

const KNOWN_MODELS = new Set([
  "sonnet", "opus", "haiku",
  "gemini-flash", "gemini-pro",
  "nvidia-glm", "nvidia-deepseek", "nvidia-devstral", "nvidia-kimi",
]);

const tooltip = document.getElementById("tooltip");
const planCanvases = {};

function px(v) { return v + "px"; }

// ── CSS parsing ──

function parsePolygonPointsPx(clipPath, width, height, insetPx = 0) {
  const m = clipPath && clipPath.match(/polygon\((.+)\)/i);
  if (!m) return null;
  const points = m[1]
    .split(",")
    .map(s => s.trim().split(/\s+/))
    .filter(pair => pair.length >= 2)
    .map(([x, y]) => {
      const nx = parseFloat(x);
      const ny = parseFloat(y);
      if (!Number.isFinite(nx) || !Number.isFinite(ny)) return null;
      const px = x.includes("%") ? (nx / 100) * width : nx;
      const py = y.includes("%") ? (ny / 100) * height : ny;
      return { x: px, y: py };
    })
    .filter(Boolean);
  if (points.length < 3) return null;

  if (insetPx > 0) {
    const cx = points.reduce((sum, p) => sum + p.x, 0) / points.length;
    const cy = points.reduce((sum, p) => sum + p.y, 0) / points.length;
    for (const p of points) {
      const dx = cx - p.x;
      const dy = cy - p.y;
      const len = Math.hypot(dx, dy);
      if (len > 0.001) {
        p.x += (dx / len) * insetPx;
        p.y += (dy / len) * insetPx;
      }
    }
  }

  return points.map(p => `${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(" ");
}

function parseCssPlan(text) {
  const headerMatch = text.match(/\/\*\s*(\d+)x(\d+)\s+grid\s*\|\s*1px\s*=\s*([\d.]+)m\s*\|\s*ceiling:\s*(\d+)px\s*\*\//);
  const meta = headerMatch
    ? { width: +headerMatch[1], height: +headerMatch[2], m_per_px: +headerMatch[3], ceiling: +headerMatch[4] }
    : { width: 256, height: 256, m_per_px: 0, ceiling: 0 };

  const ruleRe = /#([\w]+)\.(room|obstacle|door|window)\s*\{([^}]+)\}/g;
  const items = [];
  let m;
  while ((m = ruleRe.exec(text)) !== null) {
    const id = m[1], cls = m[2], body = m[3];
    const props = {};
    for (const pair of body.split(";")) {
      const kv = pair.trim().match(/^([\w-]+)\s*:\s*(.+)/);
      if (kv) props[kv[1]] = kv[2].trim();
    }
    const commentMatch = body.match(/\/\*\s*(.+?)\s*\*\//);
    const comment = commentMatch ? commentMatch[1] : "";
    items.push({ id, cls, props, comment });
  }
  return { meta, items };
}

// ── DOM builders ──

function makeDiv(cls, item) {
  const el = document.createElement("div");
  el.className = cls;
  el.style.left   = px(item.left);
  el.style.top    = px(item.top);
  el.style.width  = px(item.width);
  el.style.height = px(item.height);

  const info = Object.entries(item).map(([k,v]) => `${k}: ${v}`).join("\n");
  el.addEventListener("mouseenter", e => {
    tooltip.textContent = info;
    tooltip.style.display = "block";
  });
  el.addEventListener("mousemove", e => {
    tooltip.style.left = (e.clientX + 12) + "px";
    tooltip.style.top  = (e.clientY + 12) + "px";
  });
  el.addEventListener("mouseleave", () => { tooltip.style.display = "none"; });

  if ((cls === "room" || cls === "obstacle") && item["clip-path"]) {
    el.dataset.hasClip = "1";
    const points = parsePolygonPointsPx(item["clip-path"], item.width, item.height, 0.75);
    if (points) {
      const svgNS = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(svgNS, "svg");
      svg.setAttribute("class", cls === "room" ? "room-polygon-outline" : "obstacle-polygon-outline");
      svg.setAttribute("viewBox", `0 0 ${item.width} ${item.height}`);
      svg.setAttribute("preserveAspectRatio", "none");
      const poly = document.createElementNS(svgNS, "polygon");
      poly.setAttribute("points", points);
      poly.setAttribute("fill", "none");
      poly.setAttribute("stroke", cls === "room" ? "#888" : "#999");
      poly.setAttribute("stroke-width", "1");
      poly.setAttribute("stroke-dasharray", "3 2");
      poly.setAttribute("stroke-linecap", "butt");
      poly.setAttribute("stroke-linejoin", "miter");
      poly.setAttribute("vector-effect", "non-scaling-stroke");
      svg.appendChild(poly);
      el.appendChild(svg);
    }
  }

  return el;
}

function buildCanvas(meta, items) {
  const canvas = document.createElement("div");
  canvas.className = "canvas";
  canvas.style.width  = px(meta.width);
  canvas.style.height = px(meta.height);

  const roomLabeled = new Set();
  for (const item of items) {
    const data = {
      id: item.id,
      left: +item.props.left,
      top: +item.props.top,
      width: +item.props.width,
      height: +item.props.height,
    };
    if (item.props["--sill"]) data.sill = +item.props["--sill"];
    if (item.props["clip-path"]) data["clip-path"] = item.props["clip-path"];
    if (item.comment) data.name = item.comment;

    const el = makeDiv(item.cls, data);
    if (data["clip-path"]) el.style.clipPath = data["clip-path"];
    if (item.cls === "room" || item.cls === "obstacle") {
      const hlClass = item.cls === "room" ? "highlight-rooms" : "highlight-obstacles";
      el.addEventListener("mouseenter", () => canvas.classList.add(hlClass));
      el.addEventListener("mouseleave", () => canvas.classList.remove(hlClass));
    }
    canvas.appendChild(el);

    if (item.cls === "room") {
      const baseId = item.id.replace(/_\d+$/, "");
      if (!roomLabeled.has(baseId)) {
        roomLabeled.add(baseId);
        const label = document.createElement("div");
        label.className = "label";
        label.style.left = px(data.left + 4);
        label.style.top  = px(data.top + 4);
        label.textContent = item.comment.replace(/\s*\(\d+\/\d+\)$/, "");
        canvas.appendChild(label);
      }
    }
  }
  return canvas;
}

// ── Catalog + placement helpers ──

function parseFootprint(snippet) {
  const m = snippet.match(/#i(\d+)\s*\{([^}]+)\}/);
  if (!m) return null;
  const item_no = m[1], body = m[2];
  const w = body.match(/width:\s*(\d+)/);
  const h = body.match(/height:\s*(\d+)/);
  const el = body.match(/--elevation:\s*(\d+)/);
  return { item_no, width: w ? +w[1] : 8, height: h ? +h[1] : 8, elevation: el ? +el[1] : 0 };
}

function buildCatalogMaps(catalog) {
  const footprints = {}, products = {}, profiles = {};
  if (catalog) {
    if (catalog.footprints) for (const fp of catalog.footprints) {
      const p = parseFootprint(fp);
      if (p) footprints[p.item_no] = p;
    }
    if (catalog.products) for (const p of catalog.products) products[p.item_no] = p;
    if (catalog.profiles) for (const p of catalog.profiles) profiles[p.item_no] = p;
  }
  return { footprints, products, profiles };
}

function renderPlacementItems(canvas, placementJson, catalogMaps) {
  const { footprints, products, profiles } = catalogMaps;
  canvas.querySelectorAll(".placement-item").forEach(el => el.remove());

  for (const item of placementJson.items) {
    const fp = footprints[item.item_no];
    const prod = products[item.item_no];
    const prof = profiles[item.item_no];

    let w = fp ? fp.width : 10;
    let h = fp ? fp.height : 10;
    const rotated = (item.r === 90 || item.r === 270);
    const drawW = rotated ? h : w;
    const drawH = rotated ? w : h;

    const el = document.createElement("div");
    el.className = "placement-item";
    if (prof) el.classList.add(`tier-${prof.tier}`);

    el.style.left   = px(item.x - drawW / 2);
    el.style.top    = px(item.y - drawH / 2);
    el.style.width  = px(drawW);
    el.style.height = px(drawH);

    const name = prod ? prod.name : item.item_no;
    if (drawW > 14 && drawH > 8) {
      const lbl = document.createElement("div");
      lbl.className = "placement-item-label";
      lbl.textContent = name.replace(/^[A-ZÅÄÖ]+ /, s => s.trim().charAt(0) + ". ");
      el.appendChild(lbl);
    }

    const lines = [
      name + (prod && prod.color ? ` (${prod.color})` : ""),
      `item: ${item.item_no}`,
      `room: ${item.room}  pos: ${item.x},${item.y}  rot: ${item.r}°`,
      `footprint: ${w}x${h} px`,
    ];
    if (prof) {
      lines.push(`tier: ${prof.tier}  placement: ${prof.placement}`);
      if (prof.categories) lines.push(`categories: ${prof.categories.join(", ")}`);
      if (prof.tags) lines.push(`tags: ${prof.tags.join(", ")}`);
    }
    const info = lines.join("\n");
    el.addEventListener("mouseenter", () => { tooltip.textContent = info; tooltip.style.display = "block"; });
    el.addEventListener("mousemove", e => { tooltip.style.left = (e.clientX+12)+"px"; tooltip.style.top = (e.clientY+12)+"px"; });
    el.addEventListener("mouseleave", () => { tooltip.style.display = "none"; });

    canvas.appendChild(el);
  }
}

function formatStats(stats, itemCount) {
  const parts = [`${itemCount} items`];
  if (stats) {
    if (stats.total_time != null) parts.push(`${stats.total_time.toFixed(1)}s`);
    if (stats.total_input_tokens != null) parts.push(`in:${stats.total_input_tokens}`);
    if (stats.total_output_tokens != null) parts.push(`out:${stats.total_output_tokens}`);
  }
  return parts.join("  ");
}

// Legacy: load placement onto a plan canvas via fetch (for flat folder / Add layout)
async function loadPlacement(json, { append = false } = {}) {
  const canvas = planCanvases[json.plan];
  if (!canvas) return;
  if (!append) canvas.querySelectorAll(".placement-item").forEach(el => el.remove());

  let catalog = null;
  try {
    const resp = await fetch(`${OUTPUT_DIR}/${json.plan}_catalog.json`);
    if (resp.ok) catalog = await resp.json();
  } catch (e) {}

  const maps = buildCatalogMaps(catalog);
  if (append) {
    // Append mode: just add items without clearing
    const tmpJson = { items: json.items };
    renderPlacementItems(canvas, tmpJson, maps);
    // Re-add the items that were already there (renderPlacementItems clears first)
    // Actually, for append we should not use renderPlacementItems. Just add directly.
  } else {
    renderPlacementItems(canvas, json, maps);
  }

  const container = canvas.closest(".plan-container");
  let genLabel = container.querySelector(".placement-gen");
  if (!genLabel) {
    genLabel = document.createElement("div");
    genLabel.className = "placement-gen";
    container.insertBefore(genLabel, canvas);
  }
  const models = json.curate_model && json.arrange_model
    ? `curate: ${json.curate_model} → arrange: ${json.arrange_model}`
    : json.gen ? json.gen.split("-").pop() : "";
  const vibe = json.curate_vibe ? `  vibe: "${json.curate_vibe}"` : "";
  genLabel.textContent = `${json.gen || ""}  ${models}  (${json.items.length} items)${vibe}`;
}

// ── File panel ──

const loadedPlacements = [];
const filePanelEl = document.getElementById("file-panel");
const chevronBtn = document.getElementById("chevron-btn");

function toggleFilePanel() {
  filePanelEl.classList.toggle("open");
  chevronBtn.classList.toggle("open");
  chevronBtn.innerHTML = filePanelEl.classList.contains("open") ? "&#9660;" : "&#9664;";
}

function updateActiveLabel() {
  filePanelEl.innerHTML = "";
  if (loadedPlacements.length === 0) {
    filePanelEl.innerHTML = '<div class="file-empty">No placements loaded</div>';
  } else {
    for (const name of loadedPlacements) {
      const div = document.createElement("div");
      div.className = "file-entry";
      div.textContent = name;
      filePanelEl.appendChild(div);
    }
  }
}

// ── View toggle ──

function setActiveView(viewName) {
  document.getElementById("gallery-view").style.display = viewName === "gallery" ? "block" : "none";
  document.getElementById("matrix-view").style.display = viewName === "matrix" ? "block" : "none";
  for (const btn of document.querySelectorAll("#view-toggle button")) {
    btn.classList.toggle("active", btn.dataset.view === viewName);
  }
}

document.getElementById("view-toggle").addEventListener("click", (e) => {
  if (e.target.tagName !== "BUTTON") return;
  setActiveView(e.target.dataset.view);
});

// ── Unified boot ──
// 1. Discover model subdirs (if /api/output available)
// 2. For each stem, fetch plan CSS + catalog + stats + placements (all parallel)
// 3. Render gallery (with tabs if multi-model) + matrix view

async function discoverModels() {
  try {
    const resp = await fetch("/api/output");
    if (!resp.ok) return {};
    const entries = await resp.json();
    const modelDirs = entries.filter(e => e.is_dir && KNOWN_MODELS.has(e.name)).map(e => e.name);
    if (modelDirs.length === 0) return {};

    // List each model dir in parallel to know exactly which files exist
    const modelFiles = {};
    await Promise.all(modelDirs.map(async (m) => {
      try {
        const r = await fetch(`/api/output/${m}`);
        if (r.ok) modelFiles[m] = new Set((await r.json()).map(f => f.name));
      } catch (e) {}
    }));
    return modelFiles;
  } catch (e) { return {}; }
}

async function boot() {
  const modelFiles = await discoverModels();
  const activeModels = Object.keys(modelFiles).filter(m =>
    [...modelFiles[m]].some(f => f.endsWith("_placement.json"))
  );
  const hasModels = activeModels.length > 0;

  // Fetch everything per stem in parallel
  const stemResults = await Promise.all(PLAN_STEMS.map(async (stem) => {
    const fetches = [
      fetch(`${OUTPUT_DIR}/${stem}_plan.css`).catch(() => null),
      fetch(`${OUTPUT_DIR}/${stem}_catalog.json`).catch(() => null),
    ];

    let placementSources = [];
    if (hasModels) {
      fetches.push(fetch(`${OUTPUT_DIR}/${stem}_tournament.json`).catch(() => null));
      for (const m of activeModels) {
        if (modelFiles[m].has(`${stem}_placement.json`)) {
          placementSources.push(m);
          fetches.push(fetch(`${OUTPUT_DIR}/${m}/${stem}_placement.json`).catch(() => null));
        }
      }
    } else {
      fetches.push(fetch(`${OUTPUT_DIR}/${stem}_placement.json`).catch(() => null));
    }

    const responses = await Promise.all(fetches);
    const [cssResp, catResp, ...rest] = responses;

    if (!cssResp || !cssResp.ok) return null;
    const cssText = await cssResp.text();
    const { meta, items } = parseCssPlan(cssText);
    if (!meta || !items) return null;

    let catalog = null;
    try { if (catResp && catResp.ok) catalog = await catResp.json(); } catch (e) {}

    const result = { stem, meta, items, catalog, catalogMaps: buildCatalogMaps(catalog), models: {} };

    if (hasModels) {
      const statsResp = rest[0];
      let statsData = null;
      try { if (statsResp && statsResp.ok) statsData = await statsResp.json(); } catch (e) {}

      for (let i = 0; i < placementSources.length; i++) {
        const resp = rest[1 + i];
        if (!resp || !resp.ok) continue;
        try {
          const placement = await resp.json();
          if (!placement.items || !placement.plan) continue;
          let modelStats = null;
          if (statsData) {
            const arr = Array.isArray(statsData) ? statsData : (Array.isArray(statsData.models) ? statsData.models : [statsData]);
            modelStats = arr.find(s => s.model === placementSources[i]) || null;
          }
          result.models[placementSources[i]] = { placement, stats: modelStats };
        } catch (e) {}
      }
    } else {
      const placementResp = rest[0];
      if (placementResp && placementResp.ok) {
        try {
          const placement = await placementResp.json();
          if (placement.items && placement.plan) {
            result.models["_default"] = { placement, stats: null };
          }
        } catch (e) {}
      }
    }

    return result;
  }));

  // Render
  const plansDiv = document.getElementById("plans");
  const matrixDiv = document.getElementById("matrix-view");
  const allModels = [];
  let multiModel = false;

  for (const r of stemResults) {
    if (!r) continue;
    const names = Object.keys(r.models);
    if (names.length > 1 || (names.length === 1 && names[0] !== "_default")) multiModel = true;
    for (const m of names) if (m !== "_default" && !allModels.includes(m)) allModels.push(m);
  }

  // Gallery
  for (const r of stemResults) {
    if (!r) continue;
    const modelNames = Object.keys(r.models);

    const container = document.createElement("div");
    container.className = "plan-container";

    const title = document.createElement("h2");
    title.textContent = r.stem;
    container.appendChild(title);

    const metaDiv = document.createElement("div");
    metaDiv.style.fontSize = "11px";
    metaDiv.style.marginBottom = "5px";
    metaDiv.textContent = `${r.meta.width}x${r.meta.height}  |  ${r.meta.m_per_px} m/px  |  ceiling: ${r.meta.ceiling} px`;
    container.appendChild(metaDiv);

    const canvas = buildCanvas(r.meta, r.items);

    if (modelNames.length === 1 && modelNames[0] === "_default") {
      // Single placement — no tabs
      const md = r.models["_default"];
      const genLabel = document.createElement("div");
      genLabel.className = "placement-gen";
      const p = md.placement;
      const mStr = p.curate_model && p.arrange_model ? `curate: ${p.curate_model} → arrange: ${p.arrange_model}` : "";
      genLabel.textContent = `${p.gen || ""}  ${mStr}  (${p.items.length} items)`;
      container.appendChild(genLabel);
      container.appendChild(canvas);
      renderPlacementItems(canvas, md.placement, r.catalogMaps);
    } else if (modelNames.length > 0) {
      // Multi-model — tabs
      const tabBar = document.createElement("div");
      tabBar.className = "model-tabs";
      container.appendChild(tabBar);
      container.appendChild(canvas);

      const statsDiv = document.createElement("div");
      statsDiv.className = "model-stats";
      container.appendChild(statsDiv);

      let activeTab = null;
      for (const modelName of modelNames) {
        const btn = document.createElement("button");
        btn.textContent = modelName;
        btn.addEventListener("click", () => {
          if (activeTab) activeTab.classList.remove("active");
          btn.classList.add("active");
          activeTab = btn;
          renderPlacementItems(canvas, r.models[modelName].placement, r.catalogMaps);
          statsDiv.textContent = formatStats(r.models[modelName].stats, r.models[modelName].placement.items.length);
        });
        tabBar.appendChild(btn);
      }
      tabBar.children[0].click();
    } else {
      // No placements — just show plan
      container.appendChild(canvas);
    }

    canvas.dataset.planStem = r.stem;
    container.dataset.planStem = r.stem;
    plansDiv.appendChild(container);
    planCanvases[r.stem] = canvas;
  }

  // Matrix (only if multi-model)
  if (multiModel && allModels.length > 0) {
    document.getElementById("view-toggle").style.display = "";

    for (const r of stemResults) {
      if (!r) continue;
      const modelNames = Object.keys(r.models).filter(m => m !== "_default");
      if (modelNames.length === 0) continue;

      const section = document.createElement("div");
      section.className = "matrix-plan";

      const title = document.createElement("h2");
      title.textContent = r.stem;
      section.appendChild(title);

      const row = document.createElement("div");
      row.className = "matrix-row";

      for (const modelName of allModels) {
        const md = r.models[modelName];
        if (!md) continue;

        const cell = document.createElement("div");
        cell.className = "matrix-cell";

        const label = document.createElement("div");
        label.className = "matrix-cell-label";
        label.textContent = modelName;
        cell.appendChild(label);

        const wrapper = document.createElement("div");
        wrapper.className = "matrix-canvas-wrapper";
        wrapper.style.width = px(r.meta.width);
        wrapper.style.height = px(r.meta.height);

        const cv = buildCanvas(r.meta, r.items);
        renderPlacementItems(cv, md.placement, r.catalogMaps);
        wrapper.appendChild(cv);
        cell.appendChild(wrapper);

        const stats = document.createElement("div");
        stats.className = "matrix-cell-stats";
        stats.textContent = formatStats(md.stats, md.placement.items.length);
        cell.appendChild(stats);

        row.appendChild(cell);
      }

      section.appendChild(row);
      matrixDiv.appendChild(section);
    }
  }

  console.log(`Loaded ${stemResults.filter(Boolean).length} plans` +
    (allModels.length > 0 ? `, ${allModels.length} models: ${allModels.join(", ")}` : ""));
}

// ── File input handlers ──

document.getElementById("placement-input").addEventListener("change", async (e) => {
  const fileList = e.target.files;
  if (!fileList || fileList.length === 0) return;

  // Check if subfolder placements exist
  let hasSubfolderPlacements = false;
  for (const file of fileList) {
    if (file.name.endsWith("_placement.json") && file.webkitRelativePath.split("/").length === 3) {
      hasSubfolderPlacements = true;
      break;
    }
  }

  if (hasSubfolderPlacements) {
    // For uploaded folder with subfolders, just reload — the server will handle it
    // (This path is mainly for the standalone viewer without server API)
    location.reload();
  } else {
    for (const file of fileList) {
      if (!file.name.endsWith("_placement.json")) continue;
      try {
        const json = JSON.parse(await file.text());
        if (json.items && json.plan) {
          await loadPlacement(json);
          if (!loadedPlacements.includes(file.name)) loadedPlacements.push(file.name);
        }
      } catch (err) {}
    }
    updateActiveLabel();
  }
  e.target.value = "";
});

document.getElementById("layout-input").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const json = JSON.parse(await file.text());
    if (json.items && json.plan) {
      await loadPlacement(json, { append: true });
      if (!loadedPlacements.includes(file.name)) loadedPlacements.push(file.name);
    }
  } catch (err) {}
  e.target.value = "";
  updateActiveLabel();
});

boot();
</script>
